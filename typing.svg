<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 35" width="100%" height="100%">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@500;700&amp;display=swap');
    
    .typewriter-text {
      font-family: 'Fira Code', monospace;
      font-size: 18px;
      font-weight: 500;
      fill: #22d3ee;
      dominant-baseline: middle;
    }

    .cursor {
      fill: #a855f7;
      animation: blink 0.8s step-end infinite;
    }

    .text-1 {
      animation: type1 12s infinite;
    }
    .text-2 {
      animation: type2 12s infinite;
      opacity: 0;
    }
    .text-3 {
      animation: type3 12s infinite;
      opacity: 0;
    }

    .cursor-1 {
      animation: cursorMove1 12s infinite, blink 0.8s step-end infinite;
    }
    .cursor-2 {
      animation: cursorMove2 12s infinite, blink 0.8s step-end infinite;
      opacity: 0;
    }
    .cursor-3 {
      animation: cursorMove3 12s infinite, blink 0.8s step-end infinite;
      opacity: 0;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    /* Typings: Inset represents how much is HIDDEN from the right side */
    @keyframes type1 {
      0% { opacity: 1; clip-path: inset(0 100% 0 0); }
      5%, 28% { clip-path: inset(0 0 0 0); opacity: 1; }
      30%, 100% { opacity: 0; }
    }

    @keyframes type2 {
      0%, 33% { opacity: 0; }
      34% { opacity: 1; clip-path: inset(0 100% 0 0); }
      39%, 61% { clip-path: inset(0 0 0 0); opacity: 1; }
      63%, 100% { opacity: 0; }
    }

    @keyframes type3 {
      0%, 66% { opacity: 0; }
      67% { opacity: 1; clip-path: inset(0 100% 0 0); }
      72%, 94% { clip-path: inset(0 0 0 0); opacity: 1; }
      96%, 100% { opacity: 0; }
    }

    /* Cursor X movement maps to character widths */
    /* "AI/ML Undergraduate" has 19 chars -> width ~ 19 * 10.8 = 205.2px + 20px offset = 225px */
    @keyframes cursorMove1 {
      0% { opacity: 1; transform: translateX(20px); }
      5%, 28% { transform: translateX(225px); opacity: 1; }
      30%, 100% { opacity: 0; }
    }

    /* "Computer Vision Developer" has 25 chars -> width ~ 25 * 10.8 = 270px + 20px offset = 290px */
    @keyframes cursorMove2 {
      0%, 33% { opacity: 0; }
      34% { opacity: 1; transform: translateX(20px); }
      39%, 61% { transform: translateX(290px); opacity: 1; }
      63%, 100% { opacity: 0; }
    }

    /* "CampFind Creator" has 16 chars -> width ~ 16 * 10.8 = 172.8px + 20px offset = 193px */
    @keyframes cursorMove3 {
      0%, 66% { opacity: 0; }
      67% { opacity: 1; transform: translateX(20px); }
      72%, 94% { transform: translateX(193px); opacity: 1; }
      96%, 100% { opacity: 0; }
    }
  </style>

  <!-- Text 1: AI/ML Undergraduate -->
  <text x="20" y="18" class="typewriter-text text-1">AI/ML Undergraduate</text>
  <rect x="0" y="7" width="10" height="20" class="cursor cursor-1" />

  <!-- Text 2: Computer Vision Developer -->
  <text x="20" y="18" class="typewriter-text text-2">Computer Vision Developer</text>
  <rect x="0" y="7" width="10" height="20" class="cursor cursor-2" />

  <!-- Text 3: CampFind Creator -->
  <text x="20" y="18" class="typewriter-text text-3">CampFind Creator</text>
  <rect x="0" y="7" width="10" height="20" class="cursor cursor-3" />
</svg>
