<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="100%" height="100%">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&amp;family=Space+Grotesk:wght@700&amp;display=swap');
    
    .bg {
      fill: #030712;
    }
    
    .grid-lines {
      stroke: rgba(255, 255, 255, 0.03);
      stroke-width: 1;
    }
    
    .title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 52px;
      fill: #ffffff;
      letter-spacing: 4px;
      animation: titleGlow 6s infinite ease-in-out;
    }
    
    .subtitle {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 13px;
      fill: #6366f1;
      letter-spacing: 5px;
      animation: subtitleShift 6s infinite ease-in-out;
    }
    
    .node {
      animation: pulse 4s infinite ease-in-out;
    }
    
    .connection {
      stroke: url(#line-grad);
      stroke-dasharray: 8 4;
      animation: dash 20s linear infinite;
    }

    .laser-sweep {
      fill: url(#laser-grad);
      opacity: 0.15;
      animation: sweep 8s infinite linear;
    }

    @keyframes titleGlow {
      0%, 100% {
        fill: #ffffff;
        filter: drop-shadow(0 0 8px rgba(99, 102, 241, 0.6)) drop-shadow(0 0 20px rgba(99, 102, 241, 0.3));
      }
      50% {
        fill: #22d3ee;
        filter: drop-shadow(0 0 12px rgba(6, 182, 212, 0.8)) drop-shadow(0 0 25px rgba(6, 182, 212, 0.4));
      }
    }
    
    @keyframes subtitleShift {
      0%, 100% { fill: #6366f1; }
      50% { fill: #a855f7; }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.3); opacity: 0.9; }
    }
    
    @keyframes dash {
      to {
        stroke-dashoffset: -100;
      }
    }

    @keyframes sweep {
      0% { transform: translateX(-800px); }
      100% { transform: translateX(800px); }
    }
  </style>

  <defs>
    <!-- Gradients -->
    <linearGradient id="laser-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0" />
      <stop offset="50%" stop-color="#a855f7" stop-opacity="1" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.3" />
      <stop offset="50%" stop-color="#a855f7" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.3" />
    </linearGradient>

    <!-- Node Glow Filters -->
    <filter id="glow-indigo" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="260" class="bg" rx="16" />

  <!-- Grid lines -->
  <g class="grid-lines">
    <path d="M0 40 H800 M0 80 H800 M0 120 H800 M0 160 H800 M0 200 H800 M0 240 H800" />
    <path d="M80 0 V260 M160 0 V260 M240 0 V260 M320 0 V260 M400 0 V260 M480 0 V260 M560 0 V260 M640 0 V260 M720 0 V260" />
  </g>

  <!-- Laser Sweep Line -->
  <rect x="0" y="0" width="300" height="260" class="laser-sweep" />

  <!-- Neural Network Vector Paths (Connections) -->
  <g>
    <!-- Left-side network -->
    <line x1="60" y1="50" x2="120" y2="90" class="connection" stroke-width="1.5" />
    <line x1="120" y1="90" x2="90" y2="180" class="connection" stroke-width="1.5" />
    <line x1="90" y1="180" x2="60" y2="50" class="connection" stroke-width="1.5" />
    <line x1="120" y1="90" x2="170" y2="130" class="connection" stroke-width="1.5" />
    <line x1="170" y1="130" x2="90" y2="180" class="connection" stroke-width="1.5" />

    <!-- Right-side network -->
    <line x1="740" y1="80" x2="680" y2="140" class="connection" stroke-width="1.5" />
    <line x1="680" y1="140" x2="710" y2="210" class="connection" stroke-width="1.5" />
    <line x1="710" y1="210" x2="740" y2="80" class="connection" stroke-width="1.5" />
    <line x1="680" y1="140" x2="620" y2="100" class="connection" stroke-width="1.5" />
    <line x1="620" y1="100" x2="740" y2="80" class="connection" stroke-width="1.5" />
  </g>

  <!-- Nodes (Pulsing Circles) -->
  <!-- Left Network Nodes -->
  <circle cx="60" cy="50" r="5" fill="#6366f1" class="node" filter="url(#glow-indigo)" style="animation-delay: 0s; transform-origin: 60px 50px;" />
  <circle cx="120" cy="90" r="6.5" fill="#a855f7" class="node" filter="url(#glow-indigo)" style="animation-delay: 1s; transform-origin: 120px 90px;" />
  <circle cx="90" cy="180" r="4.5" fill="#06b6d4" class="node" filter="url(#glow-cyan)" style="animation-delay: 2s; transform-origin: 90px 180px;" />
  <circle cx="170" cy="130" r="5.5" fill="#6366f1" class="node" filter="url(#glow-indigo)" style="animation-delay: 0.5s; transform-origin: 170px 130px;" />

  <!-- Right Network Nodes -->
  <circle cx="740" cy="80" r="5.5" fill="#06b6d4" class="node" filter="url(#glow-cyan)" style="animation-delay: 1.5s; transform-origin: 740px 80px;" />
  <circle cx="680" cy="140" r="6" fill="#a855f7" class="node" filter="url(#glow-indigo)" style="animation-delay: 0.5s; transform-origin: 680px 140px;" />
  <circle cx="710" cy="210" r="5" fill="#6366f1" class="node" filter="url(#glow-indigo)" style="animation-delay: 2.2s; transform-origin: 710px 210px;" />
  <circle cx="620" cy="100" r="4" fill="#06b6d4" class="node" filter="url(#glow-cyan)" style="animation-delay: 1s; transform-origin: 620px 100px;" />

  <!-- Central Brand Texts -->
  <text x="400" y="125" text-anchor="middle" class="title">ALPHADEVIB</text>
  <text x="400" y="165" text-anchor="middle" class="subtitle">SYED IBRAHIM AHMED // SYSTEM STATUS: BUILDING</text>
</svg>
