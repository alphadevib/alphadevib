<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="100%">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;family=Space+Grotesk:wght@700&amp;display=swap');
    
    .bg {
      fill: url(#grad);
    }
    
    .title {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 46px;
      fill: #ffffff;
      letter-spacing: 1px;
    }
    
    .subtitle {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 16px;
      fill: #e2e8f0;
      opacity: 0.9;
      letter-spacing: 3px;
    }

    .wave {
      fill: #030712;
      opacity: 0.15;
    }

    .wave-front {
      fill: #030712;
    }
  </style>

  <defs>
    <!-- Cyan to Indigo Gradient -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="60%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#0e7490" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="240" class="bg" rx="12" />

  <!-- Smooth Wave Overlay 1 (Back) -->
  <path d="M 0 170 Q 200 130, 400 180 T 800 160 L 800 240 L 0 240 Z" class="wave" />

  <!-- Smooth Wave Overlay 2 (Mid) -->
  <path d="M 0 190 Q 250 160, 500 200 T 800 180 L 800 240 L 0 240 Z" class="wave" style="opacity: 0.25;" />

  <!-- Smooth Wave Overlay 3 (Front - matches GitHub dark background color) -->
  <path d="M 0 210 Q 300 190, 600 215 T 800 205 L 800 240 L 0 240 Z" class="wave-front" />

  <!-- Texts -->
  <text x="400" y="105" text-anchor="middle" class="title">Syed Ibrahim Ahmed</text>
  <text x="400" y="145" text-anchor="middle" class="subtitle">AI/ML Undergraduate &amp; Systems Developer</text>
</svg>
